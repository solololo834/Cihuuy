<script>

    function showSection(id) {
    document.getElementById('post-section').style.display = 'none';
    document.getElementById('setting-section').style.display = 'none';
    document.getElementById('auth-section').style.display = 'none';
    document.getElementById('profile-section').style.display = 'none';

  async function viewUserProfile(userId, username, pfp) {
    showSection('profile-section');
    document.getElementById('view-username').innerText = "@" + username;
    document.getElementById('view-pfp').src = pfp || 'default.png';
    const { data: posts } = await db.from('posts')
      .select('*')
      .eq('user_id', userId)
      .order('created_at', { ascending: false });
    const container = document.getElementById('user-posts');
    container.innerHTML = '';
    if (posts && posts.length > 0) {
      posts.forEach(p => {
        const isVideo = p.image && (p.image.includes('.mp4') || p.image.includes('.webm'));
        const mediaTag = isVideo ? `<video src="${p.image}" controls></video>` : (p.image ? `<img src="${p.image}">` : '');
        const div = document.createElement('div');
        div.className = 'post-container';
        div.innerHTML = `<p>${p.text}</p>${mediaTag}<br><small>${new Date(p.created_at).toLocaleDateString()}</small>`;
        container.appendChild(div);
      });
    } else {
      container.innerHTML = '<p style="text-align:center; color:grey;">No posts yet.</p>';
    }
  }
  function toggleAuth(isReg) {
    document.getElementById('login-form').style.display = isReg ? 'none' : 'block';
    document.getElementById('register-form').style.display = isReg ? 'block' : 'none';

  async function handleRegister() {
    const user = document.getElementById('reg-username').value;
    const pass = document.getElementById('reg-password').value;
    const { data, error } = await db.auth.signUp({ 
      email: user + "@app.com", 
      password: pass 
    });
    if (error) {

    } else {
      if (data.session) {
        userSession = data.session.user;
        document.getElementById('welcome-msg').innerText = "@" + userSession.email.split('@')[0];
updateSavedAccounts(); 
        alert("Account created successfully");
        checkSession(); 
        } else {
        alert("Account created! Please check your confirmation email or toggle 'Confirm Email' OFF in your Supabase Dashboard to log in immediately..");
      }
    }
  }
  async function handleLogin() {
    const user = document.getElementById('login-username').value;
    const pass = document.getElementById('login-password').value;
    const { data, error } = await db.auth.signInWithPassword({ email: user + "@app.com", password: pass });
    if (error) {
        alert(error.message);
    } else {
        await updateSavedAccounts();         checkSession();
    }
}

  async function handleLogout() { await db.auth.signOut(); location.reload(); }
  document.getElementById('fileInput').onchange = (e) => { selectedFileObject = e.target.files[0]; };
  document.getElementById('pfpInput').onchange = (e) => {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = (ev) => { document.getElementById('current-pfp-display').src = ev.target.result; };
      reader.readAsDataURL(file);
    }
  };
  async function savePFP() {
    const newSrc = document.getElementById('current-pfp-display').src;
    userPFP = newSrc;
    localStorage.setItem('userPFP', newSrc);
    const myId = userSession.id;
    await db.from('posts').update({ pfp: newSrc }).eq('user_id', myId);
    alert("Profile updated!");
    renderPosts();
  }
  function resetPFP() {
    userPFP = 'default.png';
    localStorage.setItem('userPFP', 'default.png');
    document.getElementById('current-pfp-display').src = 'default.png';
    renderPosts();
  }
  async function uploadToStorage(file, bucket) {
    const fileName = `${Date.now()}_${file.name}`;
    const { error } = await db.storage.from(bucket).upload(fileName, file);
    if (error) throw error;
    const { data: { publicUrl } } = db.storage.from(bucket).getPublicUrl(fileName);
    return publicUrl;
  }
  async function handlePost() {
    const text = document.getElementById('postText').value;
    if (!text && !selectedFileObject) return;
    let fileUrl = null;
    const myName = userSession.email.split('@')[0];
    if (selectedFileObject) {
      try { fileUrl = await uploadToStorage(selectedFileObject, 'files'); } 
      catch (err) { alert(err.message); return; }
    }
    const { error } = await db.from('posts').insert([
      { text, image: fileUrl, username: myName, user_id: userSession.id, pfp: userPFP, target_web: CURRENT_WEB }
    ]);
    if (error) alert(error.message); else {
      document.getElementById('postText').value = '';
      document.getElementById('fileInput').value = '';
      selectedFileObject = null;
      renderPosts();
    }
  }
  async function handleUpdateComment(postId) {
    const input = document.getElementById(`in-cmnt-${postId}`);
    const val = input.value.trim();
    if (!val) return;
    const myName = userSession.email.split('@')[0];
    const { data: post } = await db.from('posts').select('comments').eq('id', postId).single();
    const updated = [...(post.comments || []), `<b>${myName}</b>: ${val}`];
    await db.from('posts').update({ comments: updated }).eq('id', postId);
    input.value = '';
    renderPosts();
  }
  async function handleToggleLike(id) {
    const myName = userSession.email.split('@')[0];
    const { data: post } = await db.from('posts').select('likes, likedBy').eq('id', id).single();
    let list = post.likedBy || [];
    let lks = post.likes || 0;
    if (list.includes(myName)) { list = list.filter(u => u !== myName); lks--; }
    else { list.push(myName); lks++; }
    await db.from('posts').update({ likes: lks, likedBy: list }).eq('id', id);
    renderPosts();
  }
  async function handleDeletePost(id) {
    if (confirm("Delete post?")) { await db.from('posts').delete().eq('id', id); renderPosts(); }
  }
  async function handleBanUser(userId, targetName) {
    if (confirm(`Delete all posts @${targetName}?`)) {
      await db.from('posts').delete().eq('user_id', userId);
      renderPosts();
    }
  }
  async function renderPosts() {
    const { data: posts } = await db.from('posts')
      .select('*')
      .eq('target_web', CURRENT_WEB)
      .order('created_at', { ascending: false });
    const container = document.getElementById('posts');
    container.innerHTML = '';
    if (posts) {
      posts.forEach(p => {
        const myName = userSession ? userSession.email.split('@')[0] : '';
const isAdmin = (myName === "admin67");
const isOwner = (userSession && p.user_id === userSession.id); 
const canEdit = isOwner || isAdmin; 
        const canDelete = isOwner || isAdmin;
        const hasLiked = (p.likedBy || []).includes(myName);
        const isVideo = p.image && (p.image.includes('.mp4') || p.image.includes('.webm'));
        const mediaTag = isVideo ? `<video src="${p.image}" controls></video>` : (p.image ? `<img src="${p.image}">` : '');
        const div = document.createElement('div');
        div.className = 'post-container';
div.innerHTML = `
  <div class="post-header" onclick="viewUserProfile('${p.user_id}', '${p.username}', '${p.pfp}')" style="cursor:pointer">
    <img src="${p.pfp || 'default.png'}" class="pfp-mini">
    <strong>@${p.username}</strong>
  </div>
          <p>${p.text}</p>${mediaTag}
                 <div>
            <button class="btn-action" onclick="handleToggleLike('${p.id}')">${hasLiked ? '❤️' : '🤍'} ${p.likes || 0}</button>
            ${canDelete ? `<button class="btn-action btn-delete" onclick="handleDeletePost('${p.id}')">🗑️Delete </button>` : ''}
            ${canEdit ? `<button class="btn-action" style="background:#ffc107; color:black; border:none;" onclick="handleEditPost('${p.id}')">✏️ Edit</button>` : ''}

            ${isAdmin && p.username !== 'admin67' ? `<button class="btn-action" style="background:black; color:white;" onclick="handleBanUser('${p.user_id}', '${p.username}')">🚫 BAN</button>` : ''}
          </div>
          <div style="margin-top:10px">
            <input type="text" id="in-cmnt-${p.id}" placeholder="comment here don't be shy..." style="width:70%; padding:5px">
            <button class="btn-comment" onclick="handleUpdateComment('${p.id}')">Post</button>
            <div style="margin-top:5px">${(p.comments || []).map(c => `<div class="comment-box">${c}</div>`).join('')}</div>
          </div>`;
        container.appendChild(div);
      });
    }
  }
  async function checkSession() {
    try {
      const { data: { session }, error } = await db.auth.getSession();
      if (error) throw error;
      if (session && session.user) {
        userSession = session.user;
        document.getElementById('welcome-msg').innerText = "@" + userSession.email.split('@')[0];
        showSection('post-section'); 
        renderPosts(); 
      } else {
        showSection('auth-section'); 
      }
    } catch (err) {
      console.error("Session Error:", err);
      showSection('auth-section');
    }
  }
  checkSession();
  function togglePasswordVisibility(inputId) {
  const passwordInput = document.getElementById(inputId);
  if (passwordInput.type === "password") {
    passwordInput.type = "text";
  } else {
    passwordInput.type = "password";
  }
}
async function handleEditPost(id) {
  const { data: post, error: fetchError } = await db.from('posts').select('text, user_id').eq('id', id).single();
  
  if (fetchError || !post) {
    alert("Failed to fetch post data!");
    return;
  }

  const myName = userSession.email.split('@')[0];
  if (post.user_id !== userSession.id && myName !== "admin67") {
    alert("You do not have permission to edit this post!");
    return;
  }

  const newText = prompt("Edit this post:", post.text);
  if (newText !== null && newText.trim() !== "") {
    const { error } = await db.from('posts').update({ text: newText }).eq('id', id);
    if (error) {
      alert(error.message);
    } else {
      renderPosts(); 
      if(document.getElementById('profile-section').style.display === 'block') {
          const viewName = document.getElementById('view-username').innerText.replace('@', '');
          const viewPfp = document.getElementById('view-pfp').src;
          viewUserProfile(post.user_id, viewName, viewPfp);
      }
    }
  }
}

let savedAccounts = JSON.parse(localStorage.getItem('savedAccounts')) || [];

function toggleSwitchModal() {
    const modal = document.getElementById('switch-modal');
    modal.style.display = modal.style.display === 'none' ? 'block' : 'none';
    if(modal.style.display === 'block') renderAccountList();
}

async function updateSavedAccounts() {
    const { data: { session } } = await db.auth.getSession();
    if (!session) return;

    const userData = {
        id: session.user.id,
        email: session.user.email,
        username: session.user.email.split('@')[0],
        refresh_token: session.refresh_token,
        pfp: userPFP
    };

    const index = savedAccounts.findIndex(acc => acc.id === userData.id);
    if (index > -1) {
        savedAccounts[index] = userData;
    } else {
        savedAccounts.push(userData);
    }
    
    localStorage.setItem('savedAccounts', JSON.stringify(savedAccounts));
}

function renderAccountList() {
    const listDiv = document.getElementById('account-list');
    listDiv.innerHTML = '';
    
    savedAccounts.forEach((acc, index) => {
        const isCurrent = userSession && acc.id === userSession.id;
        
        const itemDiv = document.createElement('div');
        itemDiv.style = "display:flex; align-items:center; justify-content:space-between; padding:10px; border-bottom:1px solid #eee; margin-bottom:5px; border-radius:8px;";
        if(isCurrent) itemDiv.style.background = "#e7f3ff";

        // Bagian Informasi Akun (Klik untuk pindah)
        const infoDiv = document.createElement('div');
        infoDiv.style = "display:flex; align-items:center; flex-grow:1; cursor:pointer;";
        infoDiv.innerHTML = `
            <img src="${acc.pfp || 'default.png'}" style="width:30px; height:30px; border-radius:50%; margin-right:10px; object-fit:cover;">
            <span style="font-weight:bold; font-size:14px;">${acc.username} ${isCurrent ? '<small>(Active)</small>' : ''}</span>
        `;
        
        if(!isCurrent) {
            infoDiv.onclick = () => switchAccount(acc.refresh_token);
        }

        const deleteBtn = document.createElement('button');
        deleteBtn.innerHTML = "✕";
        deleteBtn.style = "background:#ff4d4d; color:white; border:none; border-radius:4px; padding: 2px; cursor:pointer; margin-left: -10px; font-size:12px; width: 50px;";
        deleteBtn.onclick = (e) => {
            e.stopPropagation();             removeAccountFromList(acc.id);
        };

        itemDiv.appendChild(infoDiv);
        itemDiv.appendChild(deleteBtn);
        listDiv.appendChild(itemDiv);
    });
}


async function switchAccount(refreshToken) {
    const { data, error } = await db.auth.refreshSession({ refresh_token: refreshToken });
    if (error) {
        alert("Session expired, please login again.");
        savedAccounts = savedAccounts.filter(acc => acc.refresh_token !== refreshToken);
        localStorage.setItem('savedAccounts', JSON.stringify(savedAccounts));
    } else {
        location.reload();
    } else {
        renderAccountList();    }
}
